<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard historie výroby</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: topbar(true)}"></div>

<div class="container wide">
    <section class="hero-card compact">
        <div class="header-row">
            <h1>Dashboard historie výroby</h1>
            <span class="subtitle">Operátor: <strong th:text="${userEmail}"></strong></span>
        </div>

        <form class="toolbar" th:action="@{/dashboard}" method="get">
            <label>Od:</label>
            <input type="date" name="dateFrom" th:value="${filter.dateFrom}">

            <label>Do:</label>
            <input type="date" name="dateTo" th:value="${filter.dateTo}">

            <label>Číslo objednávky:</label>
            <input type="text" name="orderNumber" th:value="${filter.orderNumber}" placeholder="100245">

            <label>Status:</label>
            <select name="status">;
                <option value="">Vše</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == filter.status}"></option>
            </select>

            <label>Typ:</label>
            <select name="type">
                <option value="">Vše</option>
                <option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${t == filter.type}"></option>
            </select>

            <button type="submit">Filtrovat</button>
            <a class="button-link secondary-link" th:href="@{/dashboard}">Reset</a>
        </form>

        <div class="summary-cards">
            <div class="summary-card"><small>Celkem řádků</small><strong th:text="${recipePage.totalElements}">0</strong></div>
            <div class="summary-card"><small>OK</small><strong th:text="${okCount}">0</strong></div>
            <div class="summary-card"><small>NOK</small><strong th:text="${nokCount}">0</strong></div>
        </div>

        <h2>Hlavní přehled (max. 10 řádků)</h2>
        <div class="table-wrap card">
            <table>
                <thead>
                <tr>
                    <th>Datum a čas</th>
                    <th>Číslo objednávky</th>
                    <th>Status</th>
                    <th>Typ</th>
                    <th>Kamera</th>
                    <th>DM kód</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(recipes)}">
                    <td colspan="6">No content in table</td>
                </tr>
                <tr th:each="recipe : ${recipes}">
                    <td th:text="${recipe.date}"></td>
                    <td th:text="${recipe.EANCode}"></td>
                    <td th:text="${recipe.result}"></td>
                    <td th:text="${recipe.recipe}"></td>
                    <td th:text="${recipe.camera}"></td>
                    <td th:text="${recipe.DMCode}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="actions" th:if="${totalPages > 1}">
            <a class="button-link secondary-link"
               th:if="${currentPage > 0}"
               th:href="@{/dashboard(page=${currentPage - 1}, dateFrom=${filter.dateFrom}, dateTo=${filter.dateTo}, orderNumber=${filter.orderNumber}, status=${filter.status}, type=${filter.type})}">Předchozí</a>
            <span>Stránka <strong th:text="${currentPage + 1}"></strong> z <strong th:text="${totalPages}"></strong></span>
            <a class="button-link"
               th:if="${currentPage + 1 < totalPages}"
               th:href="@{/dashboard(page=${currentPage + 1}, dateFrom=${filter.dateFrom}, dateTo=${filter.dateTo}, orderNumber=${filter.orderNumber}, status=${filter.status}, type=${filter.type})}">Další</a>
        </div>
    </section>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
