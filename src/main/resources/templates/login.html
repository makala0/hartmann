<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení</title>
</head>
<body>
<h1>Přihlášení</h1>

<p th:if="${param.error}" style="color:red;">Neplatné přihlašovací údaje.</p>
<p th:if="${param.logout}" style="color:green;">Byli jste odhlášeni.</p>

<form th:action="@{/login}" method="post">
    <div>
        <label for="username">E-mail</label>
        <input id="username" type="email" name="username" required>
    </div>

    <div>
        <label for="password">Heslo</label>
        <input id="password" type="password" name="password" required>
    </div>

    <button type="submit">Přihlásit se</button>
</form>

<p>
    Nemáte účet?
    <a th:href="@{/register}">Zaregistrujte se</a>
</p>
</body>
</html>
