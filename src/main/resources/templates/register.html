<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrace</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: topbar(false)}"></div>

<div class="container auth-layout">
    <section class="hero-card">
        <h1>Registrace</h1>
        <p class="subtitle">Vytvoř si účet během pár sekund a začni pracovat s aplikací.</p>
        <ul class="feature-list">
            <li>Jednoduchý registrační formulář</li>
            <li>Validace e-mailu a hesla</li>
            <li>Okamžitý přístup po přihlášení</li>
        </ul>
    </section>

    <section>
        <p class="alert success" th:if="${successMessage}" th:text="${successMessage}"></p>

        <form class="card" th:action="@{/register}" th:object="${registerForm}" method="post">
            <div class="form-row">
                <label for="email">E-mail</label>
                <input id="email" type="email" th:field="*{email}" required autocomplete="email">
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></small>
            </div>

            <div class="form-row">
                <label for="password">Heslo</label>
                <input id="password" type="password" th:field="*{password}" required autocomplete="new-password">
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></small>
            </div>

            <div class="form-row">
                <label for="confirmPassword">Potvrzení hesla</label>
                <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required autocomplete="new-password">
                <small th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error"></small>
            </div>

            <button type="submit">Registrovat</button>

            <p class="hint">
                Už máte účet?
                <a th:href="@{/login}">Přihlaste se</a>
            </p>
        </form>
    </section>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
